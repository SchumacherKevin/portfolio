<section class="skills" id="skills">
  <div class="skills__inner">
    <h2 class="skills__heading">{{ 'SKILLS.TITLE' | translate }}</h2>

    <div class="skills__grid">
      @for (skill of skills; track skill.label) {
        <div class="skills__item" [class.skills__item--challenge]="skill.challenge">
          <div class="skills__icon-wrap">
            @if (skill.challenge) {
              <img
                [src]="skill.icon"
                [alt]="skill.label | translate"
                class="skills__icon skills__icon--plain"
              />
            } @else {
              <span
                class="skills__icon"
                role="img"
                [attr.aria-label]="skill.label"
                [style.mask-image]="'url(' + skill.icon + ')'"
                [style.-webkit-mask-image]="'url(' + skill.icon + ')'"
              ></span>
            }
          </div>
          @if (skill.challenge) {
            <span class="skills__label" [innerHTML]="skill.label | translate"></span>
          } @else {
            <span class="skills__label">{{ skill.label }}</span>
          }
        </div>
      }
    </div>

    <div class="skills__mobile-cta">
      <img src="assets/arrow-mobile.svg" class="skills__cta-arrow" alt="" aria-hidden="true" />
      <p class="skills__note">{{ 'SKILLS.NOTE' | translate }}</p>
      <a href="#contact" appScrollTo="contact" class="skills__cta">{{
        'SKILLS.CTA' | translate
      }}</a>
    </div>
  </div>
</section>
