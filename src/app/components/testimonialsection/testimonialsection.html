<section class="testimonials" id="testimonials">
  <h2 class="testimonials__title">Need a teamplayer? Here's what my colleagues say about me</h2>

  <div class="testimonials__body">
    <img
      src="assets/arrow-curved-red-big.svg"
      class="testimonials__arrow"
      alt=""
      aria-hidden="true"
    />

    <div class="testimonials__cards">
      @for (item of testimonials; track item.name) {
        <div class="testimonials__card">
          <h3 class="testimonials__name">{{ item.name }}</h3>
          <p class="testimonials__project">{{ item.project }}</p>
          <p class="testimonials__quote">'' {{ item.quote }} ''</p>
        </div>
      }
    </div>
  </div>
</section>
