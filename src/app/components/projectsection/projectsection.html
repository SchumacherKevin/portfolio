<section class="projects" id="projects">
  <h2 class="projects__title">My Projects</h2>

  <div class="projects__list">
    @for (project of projects; track project.title) {
      <article class="projects__item" [class.projects__item--reversed]="!project.imageLeft">
        <div class="projects__image-wrapper">
          <img class="projects__image" [src]="project.image" [alt]="project.imageAlt" />
        </div>

        <div class="projects__content">
          <h3 class="projects__name">{{ project.title }}</h3>
          <p class="projects__tech">{{ project.technologies.join(' | ') }}</p>
          <p class="projects__description">{{ project.description }}</p>
          <div class="projects__actions">
            <a
              class="projects__btn projects__btn--outline"
              [href]="project.githubUrl"
              target="_blank"
              rel="noopener noreferrer"
              >GitHub</a
            >
            <a
              class="projects__btn projects__btn--filled"
              [href]="project.liveUrl"
              target="_blank"
              rel="noopener noreferrer"
              >Live Test</a
            >
          </div>
        </div>
      </article>
    }
  </div>
</section>
